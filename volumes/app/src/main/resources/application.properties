spring.datasource.url=jdbc:mysql://db:3306/demo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Tokyo
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# GraphiQL設定
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.cdn.enabled=false
spring.graphql.exception.show-message=always

# 【修正】この行は削除してください（SecurityConfigを有効にするため）
# spring.autoconfigure.exclude=... (削除)

# 【追加】セッション維持のための設定
server.servlet.session.cookie.http-only=true
# セッションの管理方法を確実に「Cookie」にする
server.servlet.session.tracking-modes=cookie
# Cookieの名称を明示（念のため）
server.servlet.session.cookie.name=JSESSIONID
# 開発環境（HTTP）でCookieが拒否されないように設定
server.servlet.session.cookie.secure=false
# 全てのパスでCookieを有効にする
server.servlet.session.cookie.path=/
# 同一サイト制限を緩和（Docker構成でのトラブル回避）
server.servlet.session.cookie.same-site=lax