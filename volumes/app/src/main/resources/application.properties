spring.datasource.url=jdbc:mysql://db:3306/demo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Tokyo
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# GraphiQLを有効にする
spring.graphql.graphiql.enabled=true

# 【重要】もしこれまでの Loading... がブラウザのブロックだった場合、
# 自分のPC内のJSを使うように設定（前回の設定を維持）
spring.graphql.graphiql.cdn.enabled=false