<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>新規会員登録 - TechShop Demo</title>
<link rel="stylesheet" media="all" th:href="@{/css/ress.min.css}" />
<link rel="stylesheet" media="all" th:href="@{/css/style.css}" />
<script th:src="@{/js/jquery-2.1.4.min.js}"></script>
<script th:src="@{/js/style.js}"></script>

<link rel="icon" type="image/png" th:href="@{/img/favicon.png}">

</head>
<body>
    <header>
        <div class="container">
            <div class="row">
                <div class="col span-12">
                    <div class="head">
                        <h1>
                            <a th:href="@{/}">TechShop Demo</a>
                        </h1>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col span-12">
                    <nav>
                        <div id="open">
                            <img th:src="@{/img/button.png}">
                        </div>
                        <div id="close">
                            <img th:src="@{/img/button2.png}">
                        </div>
                        <div id="navi">
                            <ul>
                                <li><a th:href="@{/}">ホーム</a></li>
                                <li><a th:href="@{/form}">お問い合わせ</a></li>
                                <li><a th:href="@{/account/login}">ログイン</a></li>
                            </ul>
                        </div>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <div class="mainimg">
        <img th:src="@{/img/subimg.jpg}" alt="新規登録画像">
    </div>

    <main>
        <article>
            <div class="container">
                <div class="row">
                    <div class="col span-12">
                        <div class="breadcrumb">
                            <ul>
                                <li><a th:href="@{/}">ホーム</a> > 新規会員登録</li>
                            </ul>
                        </div>

                        <h2 class="underline">新規会員登録</h2>
						<div th:if="${error}" style="color: red; margin-bottom: 20px;">
						    <p th:text="${error}"></p>
						</div>
                        
						<form th:action="@{/account/register}" method="post">
						    <p>
						        <label for="email">メールアドレス (必須)</label> 
						        <input class="full-width" type="email" id="email" th:name="email" placeholder="example@test.com" required>
						    </p>
						    <p>
						        <label for="password">パスワード (必須・8文字以上推奨)</label> 
						        <input class="full-width" type="password" id="password" th:name="password" placeholder="パスワード" required>
						    </p>
						    <p>
						        <label for="passwordConfirm">パスワード確認 (必須)</label> 
						        <input class="full-width" type="password" id="passwordConfirm" th:name="passwordConfirm" placeholder="パスワード（確認用）" required>
						    </p>
						    <p>
						        <input class="button" type="submit" value="登録する">
						    </p>
						</form>
                        
                        <p style="margin-top: 20px;">
                            <a th:href="@{/account/login}">既にアカウントをお持ちの方（ログイン）</a>
                        </p>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <footer>
        <div class="container">
            <div class="row">
                <div class="col span-12">
                    <h5>お知らせ</h5>
                    <p>電話での問合せは承っておりません。</p>
                    <p>回答にお時間頂くことがございます。予めご了承ください。</p>
                </div>
            </div>
        </div>
    </footer>
    
    <p id="pagetop">
        <a href="#">TOP</a>
    </p>

    <script th:src="@{/js/register.js}"></script>
</body>
</html>
