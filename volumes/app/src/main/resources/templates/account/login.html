<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ログイン - ポートフォリオサイト</title>
<link rel="stylesheet" media="all" th:href="@{/css/ress.min.css}" />
<link rel="stylesheet" media="all" th:href="@{/css/style.css}" />
<script th:src="@{/js/jquery-2.1.4.min.js}"></script>
<script th:src="@{/js/style.js}"></script>

<!-- Favicon -->
<link rel="icon" type="image/png" th:href="@{/img/favicon.png}">

</head>
<body>
	<header>
		<div class="container">
			<div class="row">
				<div class="col span-12">
					<div class="head">
						<h1>
							<a th:href="@{/}">TechShop Demo</a>
						</h1>
					</div>
				</div>
			</div>
			<div class="row">
				<div class="col span-12">
					<nav>
						<div id="open">
							<img th:src="@{/img/button.png}">
						</div>
						<div id="close">
							<img th:src="@{/img/button2.png}">
						</div>
						<div id="navi">
							<ul>
								<li><a th:href="@{/}">ホーム</a></li>
								<li><a th:href="@{/form}">お問い合わせ</a></li>
							</ul>
						</div>
					</nav>
				</div>
			</div>
		</div>
	</header>
	<div class="mainimg">
		<img th:src="@{/img/subimg.jpg}" alt="ログイン画像">
	</div>
	<main>
		<article>
			<div class="container">
				<div class="row">
					<div class="col span-12">
						<div class="breadcrumb">
							<ul>
								<li><a th:href="@{/}">ホーム</a> > ログイン</li>
							</ul>
						</div>

						<th:block th:if="message != null">
							<h2 th:class="msg" th:text="${message}"></h2>
						</th:block>

						<h2 class="underline">ログイン</h2>
						<form id="loginForm">
							<p>
								<label for="email">メールアドレス</label> 
								<input class="full-width" type="email" id="email" name="email" placeholder="メールアドレス" required>
							</p>
							<p>
								<label for="password">パスワード</label> 
								<input class="full-width" type="password" id="password" name="password" placeholder="パスワード" required>
							</p>
							<p>
								<input class="button" type="submit" value="ログイン">
							</p>
						</form>
					</div>
				</div>
			</div>
		</article>
	</main>
	<footer>
		<div class="container">
			<div class="row">
				<div class="col span-12">
					<h5>お知らせ</h5>
					<p>電話での問合せは承っておりません。</p>
					<p>回答にお時間頂くことがございます。予めご了承ください。</p>
				</div>
			</div>
		</div>
	</footer>
	<p id="pagetop">
		<a href="#">TOP</a>
	</p>

	<script>
		document.getElementById('loginForm').addEventListener('submit', async (e) => {
			e.preventDefault();
			
			const email = document.getElementById('email').value;
			const password = document.getElementById('password').value;
			
			// GraphQL Mutation の実行
			const response = await fetch('/graphql', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					query: `
						mutation Login($email: String!, $password: String!) {
							login(email: $email, password: $password) {
								token
								user { id email }
							}
						}
					`,
					variables: { email, password }
				})
			});
			
			const result = await response.json();
			
			if (result.data && result.data.login) {
				// ログイン成功
				const token = result.data.login.token;
				localStorage.setItem('authToken', token);
				alert('ログインに成功しました！');
				// リダイレクト先を適宜変更してください
				window.location.href = '/';
			} else {
				// ログイン失敗
				alert('ログインに失敗しました。メールアドレスとパスワードを確認してください。');
			}
		});
	</script>
</body>
</html>
